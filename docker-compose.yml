services:
  # Banco de dados MySQL
  db:
    image: mysql:8.0
    container_name: clickfarma-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Java
  backend:
    image: maven:3.9.6-eclipse-temurin-17-alpine
    container_name: clickfarma-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /home/douglasteyh/.m2:/root/.m2
    command: mvn spring-boot:run -DskipTests
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL_DOCKER}
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OCR_SPACE_API_KEY=${OCR_SPACE_API_KEY}

    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Frontend Vue.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clickfarma-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge