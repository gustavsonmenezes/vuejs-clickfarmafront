<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ClickFarma - Farmácia Online</title>
    <!-- Google Fonts - Fraunces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.color = 'white';
        div.style.background = 'darkred';
        div.style.padding = '20px';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.zIndex = '100000';
        div.innerHTML = '<h3>ERRO GLOBAL DETECTADO:</h3>' +
                        '<p>' + msg + '</p>' +
                        '<p>Arquivo: ' + url + ' Linha: ' + line + '</p>';
        document.body.appendChild(div);
        return false;
      };
    </script>
  </head>
  <body>
    <noscript>
      <strong>Desculpe, mas o ClickFarma não funciona corretamente sem JavaScript habilitado. Por favor, ative-o para continuar.</strong>
    </noscript>
    <div id="app"></div>
  </body>
</html>
