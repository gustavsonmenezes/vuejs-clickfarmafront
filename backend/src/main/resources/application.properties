# Server Port
server.port=8080

# MySQL Database (for local development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clickfarma?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:guga1010@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:clickfarmaSecretKey2026VeryLongSecretKeyForJWTGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}

# AI Provider (groq ou gemini)
ai.provider=groq

# API Keys para IA
GEMINI_API_KEY=${GEMINI_API_KEY}
GROQ_API_KEY=${GROQ_API_KEY}

# OCR Space
ocr.space.api.key=${OCR_SPACE_API_KEY}
ocr.space.api.url=https://api.ocr.space/parse/image
ocr.space.language=por

