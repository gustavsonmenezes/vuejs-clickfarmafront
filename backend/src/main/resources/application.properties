# Porta do servidor
server.port=8080

# Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/clickfarma?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=guga1010@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=clickfarmaSecretKey2026VeryLongSecretKeyForJWTGeneration
jwt.expiration=86400000

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash
gemini.project.id=clickfarma

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Adicional para Spring Security (se tiver)
spring.security.cors.allowed-origins=*